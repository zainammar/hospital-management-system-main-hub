<h2>Patient Detail</h2>

<p><b>ID:</b> {{ patient.patient_id }}</p>
<p><b>Name:</b> {{ patient.patient_name }}</p>
<p><b>CNIC:</b> {{ patient.cnic }}</p>
<p><b>Phone:</b> {{ patient.phone }}</p>
<p><b>Gender:</b> {{ patient.gender }}</p>
<p><b>Date:</b> {{ patient.date }}</p>
<p>{{ patient.prescription|linebreaksbr }}</p>

<a href="{% url 'patient_pdf' patient.id %}" class="btn btn-danger">
    Download PDF
</a>
